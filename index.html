<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMINIASDIMOR - CONTROL LOCAL</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        // TUS LLAVES REALES (Asegúrate de que coincidan con la imagen)
        const firebaseConfig = {
            apiKey: "AIzaSyAuwdj4bvUyj-Oka2tk_MLKX4G95uWrJ5U",
            authDomain: "aminiasdimor-v4.firebaseapp.com",
            projectId: "aminiasdimor-v4",
            storageBucket: "aminiasdimor-v4.firebasestorage.app",
            messagingSenderId: "522972703623",
            appId: "1:522972703623:web:bea006e84508762c4f0122",
            measurementId: "G-TTZCSQ0XMT"
        };

        // INICIALIZACIÓN
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let currentUser = null;
    </script>
</head>
<body class="bg-[#004077] h-screen flex items-center justify-center p-4">

    <div id="loginBox" class="bg-white p-10 rounded-[3rem] shadow-2xl max-w-sm w-full text-center">
        <img src="https://i.postimg.cc/FzpMRdx4/1074ad9b-e99d-4891-a0ee-3ad298b86a68-removalai-preview.png" class="w-24 mx-auto mb-6">
        <h2 class="text-2xl font-black text-[#004077] uppercase italic mb-6">Control Local</h2>
        
        <form id="loginForm" class="space-y-4">
            <input type="email" id="logEmail" required placeholder="Correo Ministerial" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-orange-500 transition-all">
            <input type="password" id="logPass" required placeholder="Contraseña" class="w-full p-4 rounded-xl bg-slate-50 border-none outline-none focus:ring-2 focus:ring-orange-500 transition-all">
            <button type="submit" class="w-full bg-[#F05A28] text-white font-black py-4 rounded-xl uppercase shadow-lg hover:scale-105 transition-all">Entrar</button>
        </form>
    </div>

    <div id="appPanel" class="hidden fixed inset-0 bg-slate-100 flex items-center justify-center">
        <div class="text-center p-10 bg-white rounded-3xl shadow-xl border border-blue-100">
            <h1 class="text-3xl font-black text-blue-900 mb-2">¡CONEXIÓN EXITOSA!</h1>
            <p class="text-slate-500 font-bold uppercase text-[10px] tracking-widest mb-6">Bienvenido al Servidor Maestro</p>
            <div id="userData" class="mb-8 p-4 bg-blue-50 rounded-2xl text-blue-700 font-bold uppercase italic text-xs"></div>
            <button onclick="auth.signOut().then(() => location.reload())" class="bg-red-500 text-white px-8 py-3 rounded-xl font-black uppercase text-[10px]">Cerrar Sesión</button>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('logEmail').value.trim();
            const pass = document.getElementById('logPass').value;

            // ESTO ES LO QUE PREGUNTA A GOOGLE
            auth.signInWithEmailAndPassword(email, pass)
                .then((userCredential) => {
                    document.getElementById('loginBox').classList.add('hidden');
                    document.getElementById('appPanel').classList.remove('hidden');
                    document.getElementById('userData').innerText = "Usuario: " + userCredential.user.email;
                    document.body.className = "bg-slate-100 h-screen";
                })
                .catch((error) => {
                    console.error(error.code, error.message);
                    alert("ACCESO DENEGADO: " + error.message);
                });
        });
    </script>
</body>
</html>
